kind = "web"
previewPath = "/"
title = "Bridgix"
version = "1.0.0"
id = "artifacts/bridgix"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 20154

[services.development]
run = "pnpm --filter @workspace/bridgix run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/bridgix", "run", "build" ]
publicDir = "artifacts/bridgix/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "20154"
BASE_PATH = "/"
